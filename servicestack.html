<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ServiceStack — Lead Engine</title>
  <style>
    :root {
      --bg: #F8FAFC;
      --surface: #FFFFFF;
      --border: #E2E8F0;
      --text: #0F172A;
      --muted: #64748B;
      --primary: #2563EB;
      --primary-lt: #EFF6FF;
      --primary-dk: #1D4ED8;
      --green: #16A34A;
      --green-lt: #F0FDF4;
      --amber: #D97706;
      --amber-lt: #FFFBEB;
      --red: #DC2626;
      --red-lt: #FEF2F2;
      --purple: #7C3AED;
      --purple-lt: #F5F3FF;
      --sidebar: 224px;
      --r: 8px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); display: flex; min-height: 100vh; font-size: 14px; }

    /* ── SIDEBAR ── */
    #sidebar {
      width: var(--sidebar); background: var(--surface); border-right: 1px solid var(--border);
      display: flex; flex-direction: column; position: fixed; top: 0; left: 0; height: 100vh; z-index: 20;
    }
    .s-logo {
      padding: 18px 16px; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 10px;
    }
    .s-logo-icon {
      width: 34px; height: 34px; background: var(--primary); border-radius: 8px;
      display: flex; align-items: center; justify-content: center; color: #fff; font-weight: 800; font-size: 15px; flex-shrink: 0;
    }
    .s-logo-name { font-weight: 700; font-size: 15px; }
    .s-logo-tag { font-size: 10px; color: var(--muted); font-weight: 400; }
    .s-nav { padding: 10px 8px; flex: 1; overflow-y: auto; }
    .nav-section { font-size: 10px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.8px; padding: 12px 8px 4px; }
    .nav-item {
      display: flex; align-items: center; gap: 10px; padding: 8px 10px; border-radius: 6px;
      cursor: pointer; color: var(--muted); margin-bottom: 1px; transition: all 0.12s;
    }
    .nav-item:hover { background: var(--bg); color: var(--text); }
    .nav-item.active { background: var(--primary-lt); color: var(--primary); font-weight: 600; }
    .nav-icon { font-size: 15px; width: 18px; text-align: center; }
    .nav-badge {
      margin-left: auto; background: var(--primary); color: #fff;
      border-radius: 20px; padding: 1px 6px; font-size: 10px; font-weight: 700;
    }
    .s-footer { border-top: 1px solid var(--border); padding: 12px 12px; }
    .biz-card { background: var(--bg); border-radius: 6px; padding: 10px 12px; }
    .biz-name { font-weight: 600; font-size: 13px; }
    .biz-sub { font-size: 11px; color: var(--muted); margin-top: 2px; }
    .biz-dot { display: inline-block; width: 7px; height: 7px; border-radius: 50%; background: var(--green); margin-right: 4px; }

    /* ── MAIN ── */
    #main { margin-left: var(--sidebar); flex: 1; display: flex; flex-direction: column; min-height: 100vh; }
    .topbar {
      background: var(--surface); border-bottom: 1px solid var(--border);
      padding: 14px 24px; display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 10;
    }
    .topbar-left h1 { font-size: 17px; font-weight: 700; }
    .topbar-left p { font-size: 12px; color: var(--muted); margin-top: 1px; }
    .topbar-right { display: flex; gap: 8px; align-items: center; }
    .content { padding: 24px; flex: 1; }

    /* ── BUTTONS ── */
    .btn {
      display: inline-flex; align-items: center; gap: 6px; padding: 8px 14px;
      border-radius: 6px; font-size: 13px; font-weight: 500; cursor: pointer; border: none;
      transition: all 0.12s; line-height: 1;
    }
    .btn-primary { background: var(--primary); color: #fff; }
    .btn-primary:hover { background: var(--primary-dk); }
    .btn-ghost { background: transparent; border: 1px solid var(--border); color: var(--text); }
    .btn-ghost:hover { background: var(--bg); }
    .btn-sm { padding: 5px 10px; font-size: 12px; }
    .btn-danger { background: var(--red); color: #fff; }
    .btn-success { background: var(--green); color: #fff; }

    /* ── STATS ── */
    .stat-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 22px; }
    .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r); padding: 16px 18px; }
    .stat-label { font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }
    .stat-val { font-size: 30px; font-weight: 800; margin: 6px 0 2px; line-height: 1; }
    .stat-delta { font-size: 11px; color: var(--green); }
    .stat-delta.down { color: var(--red); }
    .stat-icon { float: right; font-size: 22px; opacity: 0.15; margin-top: -2px; }

    /* ── CARD ── */
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r); }
    .card-header { padding: 14px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
    .card-title { font-size: 14px; font-weight: 700; }
    .card-body { padding: 16px; }

    /* ── TABLE ── */
    .tbl-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r); overflow: hidden; }
    .tbl-head { padding: 12px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
    .tbl-title { font-weight: 700; font-size: 14px; }
    .tbl-search { padding: 6px 10px; border: 1px solid var(--border); border-radius: 6px; font-size: 13px; outline: none; width: 200px; }
    table { width: 100%; border-collapse: collapse; }
    th { background: var(--bg); padding: 9px 14px; text-align: left; font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 1px solid var(--border); }
    td { padding: 11px 14px; border-bottom: 1px solid var(--border); font-size: 13px; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #FAFBFC; }
    .lead-name { font-weight: 600; }
    .lead-source { font-size: 11px; color: var(--muted); }

    /* ── BADGES ── */
    .badge { display: inline-flex; align-items: center; padding: 2px 8px; border-radius: 20px; font-size: 11px; font-weight: 600; white-space: nowrap; }
    .b-new      { background: var(--primary-lt); color: var(--primary); }
    .b-contacted{ background: var(--purple-lt);  color: var(--purple); }
    .b-estimate { background: var(--amber-lt);   color: var(--amber); }
    .b-won      { background: var(--green-lt);   color: var(--green); }
    .b-lost     { background: var(--red-lt);     color: var(--red); }
    .b-phone    { background: #F0F9FF; color: #0369A1; }
    .b-web      { background: var(--green-lt); color: var(--green); }
    .b-sms      { background: var(--amber-lt); color: var(--amber); }
    .b-email    { background: var(--purple-lt); color: var(--purple); }

    /* ── MODAL ── */
    .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 100; align-items: center; justify-content: center; }
    .overlay.open { display: flex; }
    .modal { background: var(--surface); border-radius: 12px; padding: 26px; width: 500px; max-width: 94vw; box-shadow: 0 20px 60px rgba(0,0,0,0.15); }
    .modal-title { font-size: 17px; font-weight: 700; margin-bottom: 18px; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .form-group { margin-bottom: 14px; }
    label { display: block; font-size: 12px; font-weight: 600; color: var(--muted); margin-bottom: 5px; }
    input, select, textarea {
      width: 100%; padding: 8px 11px; border: 1px solid var(--border);
      border-radius: 6px; font-size: 13px; outline: none; transition: border-color 0.12s;
      background: #fff; font-family: inherit;
    }
    input:focus, select:focus, textarea:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(37,99,235,0.08); }
    textarea { resize: vertical; min-height: 72px; }
    .form-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 18px; }

    /* ── KANBAN ── */
    .kanban { display: grid; grid-template-columns: repeat(5, 1fr); gap: 14px; }
    .k-col { background: var(--bg); border-radius: var(--r); padding: 10px; min-height: 440px; }
    .k-col-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; padding-bottom: 8px; }
    .k-col-title { font-size: 12px; font-weight: 700; }
    .k-count { background: var(--border); color: var(--muted); border-radius: 20px; padding: 1px 7px; font-size: 11px; font-weight: 700; }
    .k-bar { height: 3px; border-radius: 2px; margin-bottom: 10px; }
    .k-card { background: var(--surface); border: 1px solid var(--border); border-radius: 6px; padding: 11px 12px; margin-bottom: 8px; cursor: pointer; transition: box-shadow 0.12s; }
    .k-card:hover { box-shadow: 0 3px 12px rgba(0,0,0,0.1); }
    .k-name { font-weight: 600; font-size: 13px; }
    .k-meta { font-size: 11px; color: var(--muted); margin-top: 3px; }
    .k-actions { display: flex; gap: 4px; margin-top: 8px; flex-wrap: wrap; }
    .k-btn { padding: 3px 7px; border-radius: 4px; font-size: 10px; font-weight: 600; cursor: pointer; border: 1px solid var(--border); background: var(--bg); color: var(--muted); transition: all 0.1s; }
    .k-btn:hover { background: var(--primary-lt); color: var(--primary); border-color: var(--primary); }

    /* ── FOLLOW-UP TIMELINE ── */
    .seq-row { display: flex; align-items: flex-start; gap: 0; margin-bottom: 24px; overflow-x: auto; padding-bottom: 8px; }
    .seq-step { display: flex; flex-direction: column; align-items: center; }
    .seq-connector { flex: 1; height: 2px; background: var(--border); margin-top: 17px; min-width: 28px; }
    .seq-connector.done { background: var(--green); }
    .seq-dot { width: 34px; height: 34px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 800; border: 2px solid var(--border); flex-shrink: 0; }
    .seq-dot.sent    { background: var(--green); border-color: var(--green); color: #fff; }
    .seq-dot.pending { background: var(--primary); border-color: var(--primary); color: #fff; }
    .seq-dot.future  { background: #fff; border-color: var(--border); color: var(--muted); }
    .seq-label { font-size: 10px; text-align: center; color: var(--muted); margin-top: 5px; max-width: 72px; line-height: 1.3; }
    .seq-type { font-size: 9px; text-align: center; font-weight: 700; color: var(--muted); margin-top: 2px; }

    /* ── SCHEDULE ── */
    .sched-grid { display: grid; grid-template-columns: 1fr 300px; gap: 20px; }
    .mini-cal { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r); overflow: hidden; }
    .cal-nav { display: flex; align-items: center; justify-content: space-between; padding: 12px 14px; border-bottom: 1px solid var(--border); }
    .cal-month { font-weight: 700; font-size: 14px; }
    .cal-chevron { background: none; border: 1px solid var(--border); border-radius: 4px; padding: 3px 8px; cursor: pointer; font-size: 14px; }
    .cal-days { display: grid; grid-template-columns: repeat(7, 1fr); padding: 8px; gap: 2px; }
    .cal-dh { text-align: center; font-size: 10px; font-weight: 700; color: var(--muted); padding: 4px; }
    .cal-d { text-align: center; font-size: 12px; padding: 5px 2px; border-radius: 50%; cursor: pointer; transition: background 0.1s; width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; margin: auto; }
    .cal-d:hover { background: var(--bg); }
    .cal-d.today { background: var(--primary); color: #fff; font-weight: 700; }
    .cal-d.has-appt { background: var(--primary-lt); color: var(--primary); font-weight: 700; }
    .cal-d.other { color: var(--border); cursor: default; }

    /* ── IVR FLOW ── */
    .ivr-flow { display: flex; align-items: flex-start; gap: 10px; overflow-x: auto; padding: 8px 0 16px; }
    .ivr-node { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 12px 14px; min-width: 150px; max-width: 180px; flex-shrink: 0; }
    .ivr-title { font-weight: 700; font-size: 12px; margin-bottom: 4px; }
    .ivr-desc { font-size: 11px; color: var(--muted); line-height: 1.4; }
    .ivr-tag { display: inline-block; margin-top: 6px; padding: 1px 6px; border-radius: 3px; font-size: 10px; font-weight: 700; }
    .ivr-arrow { color: var(--muted); font-size: 18px; padding-top: 18px; flex-shrink: 0; }
    .ivr-branch { display: flex; flex-direction: column; gap: 8px; }

    /* ── SETTINGS ── */
    .settings-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    .settings-section { font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin: 18px 0 10px; }

    /* ── TOAST ── */
    #toast {
      position: fixed; bottom: 22px; right: 22px; background: #1E293B; color: #fff;
      padding: 11px 16px; border-radius: 8px; font-size: 13px; z-index: 999;
      transform: translateY(100px); opacity: 0; transition: all 0.25s; max-width: 300px;
    }
    #toast.show { transform: translateY(0); opacity: 1; }

    /* ── MISC ── */
    .ai-pill { display: inline-flex; align-items: center; gap: 4px; background: linear-gradient(135deg, #6366F1, #8B5CF6); color: #fff; border-radius: 20px; padding: 2px 8px; font-size: 10px; font-weight: 700; }
    .empty-state { text-align: center; padding: 48px 24px; color: var(--muted); }
    .empty-icon { font-size: 36px; margin-bottom: 10px; }
    .section-title { font-size: 14px; font-weight: 700; margin-bottom: 12px; }
    .tag-row { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 4px; }
    hr.divider { border: none; border-top: 1px solid var(--border); margin: 18px 0; }
    .pill { display: inline-flex; align-items: center; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; }
    .compare-banner {
      background: linear-gradient(135deg, #1E293B, #0F172A); color: #fff;
      padding: 10px 18px; display: flex; align-items: center; gap: 12px; font-size: 12px;
    }
    .compare-banner strong { color: #F0B429; }
    .compare-col { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .diff-item { padding: 10px 14px; border-radius: 6px; font-size: 12px; line-height: 1.5; }
    .diff-them { background: #1C1A10; border: 1px solid #3D3510; color: #D4A400; }
    .diff-us { background: var(--primary-lt); border: 1px solid #BFDBFE; color: #1D4ED8; }
    .diff-label { font-weight: 700; font-size: 10px; letter-spacing: 0.5px; text-transform: uppercase; margin-bottom: 4px; }
  </style>
</head>
<body>

<!-- ═══ SIDEBAR ═══ -->
<div id="sidebar">
  <div class="s-logo">
    <div class="s-logo-icon">SS</div>
    <div>
      <div class="s-logo-name">ServiceStack</div>
      <div class="s-logo-tag">Lead Engine v1.0</div>
    </div>
  </div>
  <div class="s-nav">
    <div class="nav-section">Core</div>

      <span class="nav-icon">👥</span> Leads
      <span class="nav-badge" id="badge-leads">0</span>

    <div class="nav-item" onclick="go('followup')">
      <span class="nav-icon">🔁</span> Follow-Up
      <span class="nav-badge" id="badge-fu" style="display:none">3</span>
    </div>
    <div class="nav-item" onclick="go('pipeline')">
      <span class="nav-icon">📊</span> Pipeline
    </div>
    <div class="nav-item" onclick="go('schedule')">
      <span class="nav-icon">📅</span> Schedule
    </div>
    <div class="nav-section">System</div>
    <div class="nav-item" onclick="go('ivr')">
      <span class="nav-icon">📞</span> Phone IVR
    </div>
    <div class="nav-item" onclick="go('settings')">
      <span class="nav-icon">⚙️</span> Settings
    </div>
    <div class="nav-section">Meta</div>
    <div class="nav-item" onclick="go('compare')">
      <span class="nav-icon">⚖️</span> vs FlowDesk
    </div>
  </div>
  <div class="s-footer">
    <div class="biz-card">
      <div class="biz-name"><span class="biz-dot"></span><span id="biz-display">Premier HVAC</span></div>
      <div class="biz-sub">LA Metro · Active</div>
    </div>
  </div>
</div>

<!-- ═══ MAIN ═══ -->
<div id="main">
  <div class="topbar">
    <div class="topbar-left">
      <h1 id="page-title">Leads</h1>
      <p id="page-sub">Capture and manage incoming service requests</p>
    </div>
    <div class="topbar-right">
      <span class="ai-pill">✦ AI</span>
      <button class="btn btn-ghost btn-sm" onclick="go('compare')">⚖️ vs FlowDesk</button>
      <button class="btn btn-primary" id="main-action" onclick="openModal('lead')">+ Capture Lead</button>
    </div>
  </div>
  <div class="content" id="content"></div>
</div>

<!-- ═══ MODAL: Capture Lead ═══ -->
<div class="overlay" id="modal-lead">
  <div class="modal">
    <div class="modal-title">📋 Capture New Lead</div>
    <div class="form-row">
      <div class="form-group"><label>First Name</label><input id="f-fname" placeholder="Carlos" /></div>
      <div class="form-group"><label>Last Name</label><input id="f-lname" placeholder="Rivera" /></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>Phone</label><input id="f-phone" placeholder="+13105550000" /></div>
      <div class="form-group"><label>Zip Code</label><input id="f-zip" placeholder="90210" maxlength="5" /></div>
    </div>
    <div class="form-group"><label>Service Needed</label>
      <select id="f-service">
        <option>HVAC Repair</option><option>HVAC Installation</option><option>AC Tune-Up</option>
        <option>Furnace Repair</option><option>Duct Cleaning</option><option>Emergency Service</option><option>Other</option>
      </select>
    </div>
    <div class="form-row">
      <div class="form-group"><label>Source</label>
        <select id="f-source"><option value="web">Website</option><option value="phone">Phone Call</option><option value="referral">Referral</option><option value="ad">Ad</option></select>
      </div>
      <div class="form-group"><label>Priority</label>
        <select id="f-priority"><option value="normal">Normal</option><option value="high">High</option><option value="urgent">Urgent</option></select>
      </div>
    </div>
    <div class="form-group"><label>Notes</label><textarea id="f-notes" placeholder="Any extra details..."></textarea></div>
    <div class="form-actions">
      <button class="btn btn-ghost" onclick="closeModal('lead')">Cancel</button>
      <button class="btn btn-primary" onclick="captureLead()">Capture Lead + Fire SMS</button>
    </div>
  </div>
</div>

<!-- ═══ MODAL: Book Appointment ═══ -->
<div class="overlay" id="modal-appt">
  <div class="modal">
    <div class="modal-title">📅 Book Appointment</div>
    <div class="form-row">
      <div class="form-group"><label>Customer Name</label><input id="a-name" placeholder="Carlos Rivera" /></div>
      <div class="form-group"><label>Phone</label><input id="a-phone" placeholder="+13105550000" /></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>Date</label><input id="a-date" type="date" /></div>
      <div class="form-group"><label>Time</label>
        <select id="a-time">
          <option>8:00 AM</option><option>9:00 AM</option><option>10:00 AM</option><option>11:00 AM</option>
          <option>12:00 PM</option><option>1:00 PM</option><option>2:00 PM</option><option>3:00 PM</option>
          <option>4:00 PM</option><option>5:00 PM</option>
        </select>
      </div>
    </div>
    <div class="form-group"><label>Service</label>
      <select id="a-service">
        <option>HVAC Repair</option><option>HVAC Installation</option><option>AC Tune-Up</option>
        <option>Furnace Repair</option><option>Duct Cleaning</option><option>Emergency Service</option>
      </select>
    </div>
    <div class="form-group"><label>Notes</label><textarea id="a-notes" placeholder="Access instructions, contact preference..."></textarea></div>
    <div class="form-actions">
      <button class="btn btn-ghost" onclick="closeModal('appt')">Cancel</button>
      <button class="btn btn-success" onclick="bookAppt()">Book + Send Confirmation SMS</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
// ══════════════════════════════════════════════════

// ══════════════════════════════════════════════════
const S = {
  tab: 'leads',
  settings: { businessName: 'Premier HVAC', phone: '+13105550099', email: 'info@premierhvac.com', timezone: 'America/Los_Angeles', openHour: 8, closeHour: 18, emergencyPhone: '+13105550001', bookingUrl: 'https://premierhvac.com/book' },
  leads: [

    { id:2, fname:'Maria', lname:'Santos', phone:'+13235552345', zip:'90035', service:'AC Tune-Up', source:'web', status:'contacted', priority:'normal', notes:'Prefers morning appointments', created: ago(2), stage:'contacted', followup:[true,true,true,false,false,false] },

function go(tab) {
  S.tab = tab;
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  const navMap = { leads:'Leads', followup:'Follow-Up', pipeline:'Pipeline', schedule:'Schedule', ivr:'Phone IVR', settings:'Settings', compare:'vs FlowDesk' };
  const subMap = { leads:'Capture and manage incoming service requests', followup:'Automated follow-up sequences', pipeline:'Kanban pipeline — drag leads through stages', schedule:'Appointments and calendar', ivr:'Twilio Voice IVR call flow', settings:'Business configuration', compare:'Architecture and design comparison' };
  const actionMap = { leads:'+ Capture Lead', followup:'+ New Sequence', pipeline:'+ Add Lead', schedule:'+ Book Appointment', ivr:'View Call Log', settings:'Save Settings', compare:null };
  const actionFnMap = { leads:"openModal('lead')", followup:"toast('Sequences auto-created per lead')", pipeline:"openModal('lead')", schedule:"openModal('appt')", ivr:"toast('Call log coming soon')", settings:"saveSettings()" };

  document.querySelectorAll('.nav-item').forEach(el => {
    if (el.textContent.trim().startsWith({ leads:'👥', followup:'🔁', pipeline:'📊', schedule:'📅', ivr:'📞', settings:'⚙️', compare:'⚖️' }[tab])) el.classList.add('active');
  });
  // simpler active detection
  document.querySelectorAll('.nav-item').forEach(el => {
    const txt = el.getAttribute('onclick') || '';
    if (txt.includes(`'${tab}'`)) el.classList.add('active');
  });

  document.getElementById('page-title').textContent = navMap[tab];
  document.getElementById('page-sub').textContent = subMap[tab];
  const btn = document.getElementById('main-action');
  if (actionMap[tab]) { btn.textContent = actionMap[tab]; btn.style.display=''; btn.setAttribute('onclick', actionFnMap[tab]); }
  else { btn.style.display='none'; }

  updateBadges();
  render();
}

function advanceStage(id) {
  const order = ['new','contacted','estimate','won'];
  const l = S.leads.find(x=>x.id===id);

  if (i < order.length-1) { l.stage = order[i+1]; l.status = order[i+1]; }
  toast(`✅ ${l.fname} moved to "${l.stage}"`);
  render();
}

function exportLeads() {
  const csv = ['Name,Phone,Zip,Service,Source,Stage,Priority,Created',

function cancelAppt(id) {
  S.appointments = S.appointments.filter(x=>x.id!==id);

function renderMiniCal() {
  const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  document.getElementById('cal-month-label').textContent = `${months[S.calMonth]} ${S.calYear}`;
  const days = document.getElementById('cal-days');
  if (!days) return;
  const apptDates = S.appointments.map(a=>a.date);
  const first = new Date(S.calYear, S.calMonth, 1).getDay();
  const daysInMonth = new Date(S.calYear, S.calMonth+1, 0).getDate();
  const today = new Date();
  let html = ['Su','Mo','Tu','We','Th','Fr','Sa'].map(d=>`<div class="cal-dh">${d}</div>`).join('');
  for (let i=0;i<first;i++) html += `<div class="cal-d other"></div>`;
  for (let d=1;d<=daysInMonth;d++) {
    const dateStr = `${S.calYear}-${String(S.calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const isToday = d===today.getDate() && S.calMonth===today.getMonth() && S.calYear===today.getFullYear();
    const hasAppt = apptDates.includes(dateStr);
    html += `<div class="cal-d ${isToday?'today':hasAppt?'has-appt':''}" title="${hasAppt?'Has appointment':''}">${d}</div>`;
  }
  days.innerHTML = html;
}

function calPrev() { S.calMonth--; if(S.calMonth<0){S.calMonth=11;S.calYear--;} renderMiniCal(); }
function calNext() { S.calMonth++; if(S.calMonth>11){S.calMonth=0;S.calYear++;} renderMiniCal(); }

// ══════════════════════════════════════════════════
//  LEAD CAPTURE
// ══════════════════════════════════════════════════
function captureLead() {
  const fname = document.getElementById('f-fname').value.trim();
  const lname = document.getElementById('f-lname').value.trim();
  const phone = document.getElementById('f-phone').value.trim();
  const zip   = document.getElementById('f-zip').value.trim();
  if (!fname || !phone) { toast('⚠️ Name and phone required'); return; }
  const newLead = {
    id: Date.now(), fname, lname, phone, zip,
    service: document.getElementById('f-service').value,
    source:  document.getElementById('f-source').value,
    priority:document.getElementById('f-priority').value,
    notes:   document.getElementById('f-notes').value,
    status:'new', stage:'new', created: new Date().toISOString(),
    followup: [false,false,false,false,false,false],
  };
  // Auto-fire step 0
  newLead.followup[0] = true;
  S.leads.unshift(newLead);
  closeModal('lead');
  ['f-fname','f-lname','f-phone','f-zip','f-notes'].forEach(id=>document.getElementById(id).value='');
  updateBadges();
  toast(`✅ Lead captured! 📲 SMS fired to ${fname}`);
  render();
}

function bookAppt() {
  const name  = document.getElementById('a-name').value.trim();
  const phone = document.getElementById('a-phone').value.trim();
  const date  = document.getElementById('a-date').value;
  const time  = document.getElementById('a-time').value;
  if (!name || !date) { toast('⚠️ Name and date required'); return; }
  S.appointments.push({ id:Date.now(), name, phone, date, time, service:document.getElementById('a-service').value, notes:document.getElementById('a-notes').value, confirmed:false });
  closeModal('appt');
  toast(`📅 Appointment booked for ${name} · Confirmation SMS sent`);
  render();
  if (S.tab==='schedule') renderMiniCal();
}

// ══════════════════════════════════════════════════
//  MODAL HELPERS
// ══════════════════════════════════════════════════
function openModal(id) {
  document.getElementById(`modal-${id}`).classList.add('open');
  if (id==='appt') { const today=new Date().toISOString().split('T')[0]; document.getElementById('a-date').value=today; }
}
function closeModal(id) { document.getElementById(`modal-${id}`).classList.remove('open'); }
document.querySelectorAll('.overlay').forEach(el => el.addEventListener('click', e => { if(e.target===el) el.classList.remove('open'); }));

// ══════════════════════════════════════════════════
//  UTILS
// ══════════════════════════════════════════════════
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 3200);
}

function timeAgo(iso) {
  const d = Math.round((Date.now()-new Date(iso))/60000);
  if (d<1) return 'Just now';
  if (d<60) return `${d}m ago`;
  const h = Math.round(d/60);
  if (h<24) return `${h}h ago`;
  return `${Math.round(h/24)}d ago`;
}

function updateBadges() {
  document.getElementById('badge-leads').textContent = S.leads.filter(l=>l.stage==='new').length;
  const fu = document.getElementById('badge-fu');
  const pending = S.leads.filter(l=>l.followup.some(f=>!f)&&l.stage!=='lost').length;
  fu.style.display = pending ? '' : 'none';
  fu.textContent = pending;
}

// ══════════════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════════════
updateBadges();
go('leads');
</script>
