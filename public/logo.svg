<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F0B429"/>
      <stop offset="100%" style="stop-color:#C49020"/>
    </linearGradient>
  </defs>

  <!-- Funnel icon: 3 horizontal bars narrowing down -->
  <g transform="translate(30, 25)">
    <rect x="0" y="0" width="60" height="10" rx="3" fill="url(#g)"/>
    <rect x="8" y="18" width="44" height="10" rx="3" fill="url(#g)" opacity="0.85"/>
    <rect x="16" y="36" width="28" height="10" rx="3" fill="url(#g)" opacity="0.7"/>
    <polygon points="22,52 38,52 46,70 14,70" fill="url(#g)" opacity="0.6"/>
    <rect x="14" y="64" width="32" height="10" rx="8" fill="url(#g)" opacity="0.5"/>
  </g>

  <!-- Flow text -->
  <text x="115" y="58" font-family="'Playfair Display', 'Georgia', serif" font-size="44" font-weight="700" fill="#F0EAD6" letter-spacing="-0.5">Flow</text>
  <text x="115" y="90" font-family="'IBM Plex Sans', 'Arial', sans-serif" font-size="20" font-weight="500" fill="#8A8470" letter-spacing="3.5" text-transform="uppercase">DESK</text>

  <!-- Gold dot accent -->
  <circle cx="225" cy="50" r="3" fill="#F0B429"/>
</svg>
